<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🌍 Country Adventure!</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;800;900&display=swap');

    :root {
      --yellow:  #FFD93D;
      --orange:  #FF6B35;
      --pink:    #FF6B9D;
      --purple:  #A855F7;
      --blue:    #3B82F6;
      --green:   #22C55E;
      --red:     #EF4444;
      --sky:     #38BDF8;
      --bg:      #FFF8E7;
      --card:    #FFFFFF;
      --text:    #1E293B;
      --muted:   #64748B;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px;
      overflow-x: hidden;
    }

    /* ── FLOATING BACKGROUND SHAPES ── */
    .bg-shapes { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .shape {
      position: absolute;
      border-radius: 50%;
      opacity: .12;
      animation: floatShape 8s ease-in-out infinite;
    }
    .shape:nth-child(1) { width:180px; height:180px; background:var(--yellow); top:5%;  left:5%;  animation-delay:0s; }
    .shape:nth-child(2) { width:120px; height:120px; background:var(--pink);   top:15%; right:8%; animation-delay:1s; }
    .shape:nth-child(3) { width:200px; height:200px; background:var(--blue);   bottom:10%; left:10%; animation-delay:2s; }
    .shape:nth-child(4) { width:100px; height:100px; background:var(--green);  bottom:20%; right:5%; animation-delay:3s; }
    .shape:nth-child(5) { width:150px; height:150px; background:var(--purple); top:50%; left:50%; animation-delay:1.5s; }
    @keyframes floatShape {
      0%,100% { transform: translateY(0) scale(1); }
      50%      { transform: translateY(-20px) scale(1.05); }
    }

    .wrapper { position: relative; z-index: 1; width: 100%; max-width: 680px; }

    /* ── HEADER ── */
    header { text-align: center; margin-bottom: 20px; }
    .header-emoji { font-size: 4rem; animation: bounce 2s ease-in-out infinite; display: block; }
    @keyframes bounce {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-12px); }
    }
    header h1 {
      font-family: 'Fredoka One', cursive;
      font-size: 3rem;
      color: var(--orange);
      text-shadow: 3px 3px 0 #FFD93D, 5px 5px 0 rgba(0,0,0,.08);
      line-height: 1.1;
      margin-top: 4px;
    }
    header p {
      font-size: 1.3rem;
      color: var(--muted);
      font-weight: 800;
      margin-top: 6px;
    }

    /* ── STARS ROW ── */
    .stars-row {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 16px;
    }
    .star {
      font-size: 2rem;
      opacity: .25;
      transition: all .3s;
      filter: grayscale(1);
    }
    .star.lit { opacity: 1; filter: none; animation: starPop .4s cubic-bezier(.175,.885,.32,1.275); }
    @keyframes starPop { from{transform:scale(0)} to{transform:scale(1)} }

    /* ── SCORE BAR ── */
    .score-bar {
      display: flex;
      justify-content: space-around;
      background: white;
      border-radius: 24px;
      padding: 14px 20px;
      margin-bottom: 18px;
      box-shadow: 0 4px 16px rgba(0,0,0,.08);
      border: 3px solid #F1F5F9;
    }
    .score-item { text-align: center; }
    .score-item .val {
      font-family: 'Fredoka One', cursive;
      font-size: 2.2rem;
      line-height: 1;
    }
    .score-item .lbl { font-size: 1rem; font-weight: 800; color: var(--muted); margin-top: 2px; }
    .val-correct { color: var(--green); }
    .val-wrong   { color: var(--red); }
    .val-score   { color: var(--purple); }

    /* ── MODE BUTTONS ── */
    .mode-wrap {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }
    .mode-btn {
      font-family: 'Fredoka One', cursive;
      font-size: 1.15rem;
      padding: 10px 22px;
      border-radius: 999px;
      border: 3px solid transparent;
      cursor: pointer;
      transition: all .2s;
      background: white;
      color: var(--muted);
      box-shadow: 0 3px 10px rgba(0,0,0,.08);
    }
    .mode-btn:hover  { transform: translateY(-3px); }
    .mode-btn.active { color: white; border-color: transparent; transform: translateY(-3px); box-shadow: 0 6px 16px rgba(0,0,0,.15); }
    .mode-btn[data-mode="mixed"].active   { background: var(--orange); }
    .mode-btn[data-mode="flag"].active    { background: var(--blue); }
    .mode-btn[data-mode="capital"].active { background: var(--purple); }

    /* ── PROGRESS ── */
    .progress-wrap {
      background: #E2E8F0;
      border-radius: 999px;
      height: 14px;
      margin-bottom: 6px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--yellow), var(--orange));
      border-radius: 999px;
      transition: width .5s ease;
    }
    .progress-label { text-align: center; font-size: 1.1rem; font-weight: 800; color: var(--muted); margin-bottom: 14px; }

    /* ── QUESTION CARD ── */
    .question-card {
      background: white;
      border-radius: 32px;
      padding: 32px 24px 24px;
      margin-bottom: 18px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,.10);
      border: 4px solid var(--yellow);
      animation: cardIn .4s cubic-bezier(.175,.885,.32,1.275);
    }
    @keyframes cardIn {
      from { opacity:0; transform: scale(.85) translateY(20px); }
      to   { opacity:1; transform: scale(1)  translateY(0); }
    }

    .flag-display {
      font-size: 7rem;
      line-height: 1;
      margin-bottom: 16px;
      filter: drop-shadow(0 6px 16px rgba(0,0,0,.15));
      animation: flagIn .5s cubic-bezier(.175,.885,.32,1.275);
    }
    @keyframes flagIn {
      from { transform: scale(.3) rotate(-15deg); opacity: 0; }
      to   { transform: scale(1)  rotate(0deg);  opacity: 1; }
    }

    .q-type-badge {
      display: inline-block;
      font-family: 'Fredoka One', cursive;
      font-size: 1.1rem;
      padding: 6px 18px;
      border-radius: 999px;
      margin-bottom: 14px;
      color: white;
    }
    .badge-flag    { background: var(--blue); }
    .badge-capital { background: var(--purple); }

    .question-text {
      font-family: 'Fredoka One', cursive;
      font-size: 1.8rem;
      color: var(--text);
      line-height: 1.4;
    }

    /* ── OPTIONS ── */
    .options-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 16px;
    }
    @media (max-width: 460px) { .options-grid { grid-template-columns: 1fr; } }

    .option-btn {
      background: white;
      border: 4px solid #E2E8F0;
      border-radius: 20px;
      padding: 18px 14px;
      font-family: 'Fredoka One', cursive;
      font-size: 1.35rem;
      color: var(--text);
      cursor: pointer;
      text-align: center;
      transition: all .2s;
      box-shadow: 0 4px 12px rgba(0,0,0,.07);
      position: relative;
    }
    .option-btn:hover:not(:disabled) {
      border-color: var(--orange);
      transform: translateY(-4px) scale(1.02);
      box-shadow: 0 8px 20px rgba(255,107,53,.25);
    }
    .option-btn .opt-letter {
      display: block;
      font-size: 1rem;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .option-btn.correct {
      border-color: var(--green);
      background: #F0FDF4;
      animation: correctPop .4s ease;
    }
    .option-btn.wrong {
      border-color: var(--red);
      background: #FEF2F2;
    }
    @keyframes correctPop {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.08); }
      100% { transform: scale(1); }
    }

    /* ── FEEDBACK ── */
    .feedback {
      font-family: 'Fredoka One', cursive;
      font-size: 1.6rem;
      text-align: center;
      min-height: 56px;
      border-radius: 18px;
      padding: 12px 20px;
      opacity: 0;
      transition: opacity .3s;
      margin-bottom: 14px;
    }
    .feedback.show { opacity: 1; }
    .feedback.ok  { background: #DCFCE7; color: #15803D; border: 3px solid #BBF7D0; }
    .feedback.bad { background: #FEE2E2; color: #B91C1C; border: 3px solid #FECACA; }

    /* ── NEXT BTN ── */
    .next-btn {
      width: 100%;
      font-family: 'Fredoka One', cursive;
      font-size: 1.6rem;
      padding: 18px;
      border-radius: 20px;
      border: none;
      background: linear-gradient(135deg, var(--orange), var(--pink));
      color: white;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      gap: 10px;
      box-shadow: 0 6px 20px rgba(255,107,53,.4);
      transition: transform .15s, box-shadow .15s;
    }
    .next-btn.show { display: flex; }
    .next-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 28px rgba(255,107,53,.5); }

    /* ── STREAK BADGE ── */
    .streak-badge {
      position: fixed;
      top: 16px; right: 16px;
      font-family: 'Fredoka One', cursive;
      font-size: 1.3rem;
      background: linear-gradient(135deg, var(--yellow), var(--orange));
      color: white;
      padding: 10px 20px;
      border-radius: 999px;
      display: none;
      z-index: 200;
      box-shadow: 0 4px 16px rgba(255,107,53,.5);
      animation: cardIn .3s ease;
    }

    /* ── RESULT ── */
    #result-screen {
      display: none;
      background: white;
      border-radius: 32px;
      padding: 40px 28px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,.12);
      border: 4px solid var(--yellow);
      animation: cardIn .5s ease;
    }
    .result-big-emoji { font-size: 7rem; animation: bounce 1.5s ease-in-out infinite; display: block; }
    .result-title {
      font-family: 'Fredoka One', cursive;
      font-size: 2.8rem;
      margin: 12px 0 6px;
      color: var(--orange);
    }
    .result-score {
      font-family: 'Fredoka One', cursive;
      font-size: 5rem;
      color: var(--purple);
      line-height: 1;
      margin: 10px 0;
    }
    .result-detail { font-size: 1.3rem; font-weight: 800; color: var(--muted); margin-bottom: 20px; }
    .result-stars  { font-size: 3rem; letter-spacing: 6px; margin-bottom: 28px; }

    .replay-btn {
      font-family: 'Fredoka One', cursive;
      font-size: 1.7rem;
      padding: 18px 48px;
      border-radius: 20px;
      border: none;
      background: linear-gradient(135deg, var(--green), var(--sky));
      color: white;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(34,197,94,.4);
      transition: transform .15s;
    }
    .replay-btn:hover { transform: translateY(-4px); }

    /* ── CONFETTI ── */
    .confetti-piece {
      position: fixed;
      width: 12px; height: 12px;
      border-radius: 3px;
      pointer-events: none;
      z-index: 999;
      animation: confettiFall 1.2s ease forwards;
    }
    @keyframes confettiFall {
      from { transform: translateY(-30px) rotate(0deg); opacity: 1; }
      to   { transform: translateY(105vh) rotate(720deg); opacity: 0; }
    }
  </style>
</head>
<body>

<div class="bg-shapes">
  <div class="shape"></div><div class="shape"></div><div class="shape"></div>
  <div class="shape"></div><div class="shape"></div>
</div>

<div class="streak-badge" id="streak-badge">🔥 <span id="streak-num">0</span> in a row!</div>

<div class="wrapper">
  <header>
    <span class="header-emoji">🌍</span>
    <h1>Country Adventure!</h1>
    <p>Learn countries around the world! 🗺️</p>
  </header>

  <!-- QUIZ SCREEN -->
  <div id="quiz-screen">

    <div class="stars-row" id="stars-row"></div>

    <div class="score-bar">
      <div class="score-item">
        <div class="val val-correct" id="correct-count">0</div>
        <div class="lbl">✅ Correct</div>
      </div>
      <div class="score-item">
        <div class="val val-wrong" id="wrong-count">0</div>
        <div class="lbl">❌ Wrong</div>
      </div>
      <div class="score-item">
        <div class="val val-score" id="score-count">0</div>
        <div class="lbl">⭐ Points</div>
      </div>
    </div>

    <div class="mode-wrap">
      <button class="mode-btn active" data-mode="mixed"   onclick="setMode(this,'mixed')">🎲 Mix It Up!</button>
      <button class="mode-btn"        data-mode="flag"    onclick="setMode(this,'flag')">🏳️ Flags</button>
      <button class="mode-btn"        data-mode="capital" onclick="setMode(this,'capital')">🏛️ Capitals</button>
    </div>

    <div class="progress-wrap">
      <div class="progress-bar" id="progress-bar" style="width:0%"></div>
    </div>
    <div class="progress-label" id="progress-label">Question 1 of 8</div>

    <div class="question-card" id="question-card">
      <div class="flag-display" id="flag-display">🌍</div>
      <div class="q-type-badge badge-flag" id="q-badge">🏳️ Flag</div>
      <div class="question-text" id="question-text">Loading...</div>
    </div>

    <div class="options-grid" id="options-grid"></div>
    <div class="feedback" id="feedback"></div>
    <button class="next-btn" id="next-btn" onclick="nextQuestion()">
      Next ➜
    </button>

  </div><!-- /quiz-screen -->

  <!-- RESULT SCREEN -->
  <div id="result-screen">
    <span class="result-big-emoji" id="result-emoji">🏆</span>
    <div class="result-title"  id="result-title">Amazing!</div>
    <div class="result-score"  id="result-score">0</div>
    <div class="result-detail" id="result-detail">points</div>
    <div class="result-stars"  id="result-stars"></div>
    <button class="replay-btn" onclick="startGame()">🔄 Play Again!</button>
  </div>

</div><!-- /wrapper -->

<script>
// ── DATA (kid-friendly selection) ──────────────────────────────
const COUNTRIES = [
  { name:"Japan",       flag:"🇯🇵", capital:"Tokyo" },
  { name:"France",      flag:"🇫🇷", capital:"Paris" },
  { name:"Brazil",      flag:"🇧🇷", capital:"Brasília" },
  { name:"Australia",   flag:"🇦🇺", capital:"Canberra" },
  { name:"Egypt",       flag:"🇪🇬", capital:"Cairo" },
  { name:"USA",         flag:"🇺🇸", capital:"Washington D.C." },
  { name:"India",       flag:"🇮🇳", capital:"New Delhi" },
  { name:"Italy",       flag:"🇮🇹", capital:"Rome" },
  { name:"Canada",      flag:"🇨🇦", capital:"Ottawa" },
  { name:"South Korea", flag:"🇰🇷", capital:"Seoul" },
  { name:"Mexico",      flag:"🇲🇽", capital:"Mexico City" },
  { name:"Germany",     flag:"🇩🇪", capital:"Berlin" },
  { name:"Argentina",   flag:"🇦🇷", capital:"Buenos Aires" },
  { name:"China",       flag:"🇨🇳", capital:"Beijing" },
  { name:"Russia",      flag:"🇷🇺", capital:"Moscow" },
  { name:"Spain",       flag:"🇪🇸", capital:"Madrid" },
  { name:"Thailand",    flag:"🇹🇭", capital:"Bangkok" },
  { name:"New Zealand", flag:"🇳🇿", capital:"Wellington" },
  { name:"Greece",      flag:"🇬🇷", capital:"Athens" },
  { name:"Netherlands", flag:"🇳🇱", capital:"Amsterdam" },
];

function shuffle(arr) { return [...arr].sort(() => Math.random()-.5); }

function makeQuestion(country, all, mode) {
  const type = mode === 'mixed'
    ? (Math.random() < .5 ? 'flag' : 'capital')
    : mode;
  const others = shuffle(all.filter(c => c.name !== country.name)).slice(0,3);

  let q = { type };
  if (type === 'flag') {
    q = { ...q,
      badge:'badge-flag', badgeText:'🏳️ Which country?',
      flag: country.flag,
      text: `What country is this flag from?`,
      correct: country.name,
      options: shuffle([country.name, ...others.map(c=>c.name)])
    };
  } else {
    q = { ...q,
      badge:'badge-capital', badgeText:'🏛️ Capital City',
      flag: country.flag,
      text: `What is the capital of ${country.name}?`,
      correct: country.capital,
      options: shuffle([country.capital, ...others.map(c=>c.capital)])
    };
  }
  return q;
}

// ── STATE ──────────────────────────────────────────────────────
const TOTAL = 8;
let questions=[], current=0, correct=0, wrong=0, score=0, streak=0, mode='mixed';

// ── STARS ROW ──────────────────────────────────────────────────
function buildStars() {
  const row = document.getElementById('stars-row');
  row.innerHTML = '';
  for(let i=0;i<TOTAL;i++){
    const s = document.createElement('span');
    s.className = 'star';
    s.textContent = '⭐';
    s.id = `star-${i}`;
    row.appendChild(s);
  }
}
function lightStar(i) {
  const s = document.getElementById(`star-${i}`);
  if(s) { s.classList.add('lit'); }
}

// ── GAME FLOW ──────────────────────────────────────────────────
function setMode(btn, m) {
  mode = m;
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  startGame();
}

function startGame() {
  correct=0; wrong=0; score=0; streak=0; current=0;
  questions = shuffle(COUNTRIES).slice(0,TOTAL).map(c=>makeQuestion(c,COUNTRIES,mode));
  document.getElementById('result-screen').style.display='none';
  document.getElementById('quiz-screen').style.display='block';
  buildStars();
  updateStreakBadge();
  updateScoreBar();
  renderQuestion();
}

function renderQuestion() {
  const q = questions[current];
  const pct = current/TOTAL*100;
  document.getElementById('progress-bar').style.width = pct+'%';
  document.getElementById('progress-label').textContent = `Question ${current+1} of ${TOTAL}`;

  document.getElementById('flag-display').textContent = q.flag;
  const badge = document.getElementById('q-badge');
  badge.className = `q-type-badge ${q.badge}`;
  badge.textContent = q.badgeText;
  document.getElementById('question-text').textContent = q.text;

  const grid = document.getElementById('options-grid');
  grid.innerHTML = '';
  const letters = ['A','B','C','D'];
  q.options.slice(0,4).forEach((opt,i)=>{
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="opt-letter">${letters[i]}</span>${opt}`;
    btn.onclick = () => selectAnswer(btn, opt, q);
    grid.appendChild(btn);
  });

  const fb = document.getElementById('feedback');
  fb.className='feedback'; fb.textContent='';
  document.getElementById('next-btn').classList.remove('show');

  // re-animate card
  const card = document.getElementById('question-card');
  card.style.animation='none'; void card.offsetWidth; card.style.animation='cardIn .4s cubic-bezier(.175,.885,.32,1.275)';
}

function selectAnswer(btn, chosen, q) {
  document.querySelectorAll('.option-btn').forEach(b=>b.disabled=true);
  const fb = document.getElementById('feedback');

  if (chosen === q.correct) {
    btn.classList.add('correct');
    streak++;
    const bonus = streak>=3 ? streak*2 : 0;
    score += 10 + bonus;
    correct++;
    lightStar(current);
    fb.className='feedback ok show';
    fb.textContent = streak>=3
      ? `🔥 ${streak} in a row! +${10+bonus} points!`
      : `🎉 Great job! +10 points!`;
    spawnConfetti(btn);
  } else {
    btn.classList.add('wrong');
    streak=0; wrong++;
    fb.className='feedback bad show';
    fb.textContent = `😅 Oops! The answer is: ${q.correct}`;
    document.querySelectorAll('.option-btn').forEach(b=>{
      if(b.textContent.includes(q.correct)) b.classList.add('correct');
    });
  }
  updateScoreBar();
  updateStreakBadge();
  document.getElementById('next-btn').classList.add('show');
}

function nextQuestion() {
  current++;
  if(current>=TOTAL) showResult();
  else renderQuestion();
}

function updateScoreBar() {
  document.getElementById('correct-count').textContent = correct;
  document.getElementById('wrong-count').textContent   = wrong;
  document.getElementById('score-count').textContent   = score;
}

function updateStreakBadge() {
  document.getElementById('streak-num').textContent = streak;
  document.getElementById('streak-badge').style.display = streak>=2 ? 'block' : 'none';
}

// ── RESULT ────────────────────────────────────────────────────
function showResult() {
  document.getElementById('quiz-screen').style.display='none';
  document.getElementById('result-screen').style.display='block';
  const pct = correct/TOTAL*100;
  const [emoji, title] =
    pct===100 ? ['🏆','Perfect! You\'re a Star!'] :
    pct>=75   ? ['🌟','Awesome Work!'] :
    pct>=50   ? ['😊','Good Job! Keep Going!'] :
    pct>=25   ? ['📚','Nice Try! Keep Learning!'] :
                ['🌍','Let\'s Try Again!'];
  document.getElementById('result-emoji').textContent  = emoji;
  document.getElementById('result-title').textContent  = title;
  document.getElementById('result-score').textContent  = score;
  document.getElementById('result-detail').textContent = `${correct} correct out of ${TOTAL} questions`;
  document.getElementById('result-stars').textContent  = pct>=88?'⭐⭐⭐':pct>=63?'⭐⭐':'⭐';

  if(pct>=50) setTimeout(()=>{ for(let i=0;i<60;i++) setTimeout(dropConfetti, i*40); },300);
}

// ── CONFETTI ──────────────────────────────────────────────────
const COLORS=['#FFD93D','#FF6B35','#FF6B9D','#A855F7','#3B82F6','#22C55E','#38BDF8'];
function spawnConfetti(btn) {
  const r = btn.getBoundingClientRect();
  for(let i=0;i<12;i++){
    const el=document.createElement('div');
    el.className='confetti-piece';
    el.style.cssText=`left:${r.left+Math.random()*r.width}px;top:${r.top}px;background:${COLORS[Math.floor(Math.random()*COLORS.length)]};animation-duration:${.7+Math.random()*.6}s;border-radius:${Math.random()<.5?'50%':'3px'};`;
    document.body.appendChild(el);
    el.addEventListener('animationend',()=>el.remove());
  }
}
function dropConfetti() {
  const el=document.createElement('div');
  el.className='confetti-piece';
  el.style.cssText=`left:${Math.random()*100}vw;top:-20px;background:${COLORS[Math.floor(Math.random()*COLORS.length)]};animation-duration:${1+Math.random()*1.2}s;width:${8+Math.random()*10}px;height:${8+Math.random()*10}px;border-radius:${Math.random()<.5?'50%':'3px'};`;
  document.body.appendChild(el);
  el.addEventListener('animationend',()=>el.remove());
}

// ── KEYBOARD ──────────────────────────────────────────────────
document.addEventListener('keydown', e=>{
  const map={'1':'A','2':'B','3':'C','4':'D','a':'A','b':'B','c':'C','d':'D'};
  const letter=map[e.key.toLowerCase()];
  if(letter){
    const btns=document.querySelectorAll('.option-btn:not(:disabled)');
    const idx=['A','B','C','D'].indexOf(letter);
    if(btns[idx]) btns[idx].click();
  }
  if((e.key==='Enter'||e.key===' ')&&document.getElementById('next-btn').classList.contains('show')) nextQuestion();
});

startGame();
</script>
</body>
