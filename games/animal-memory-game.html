<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animal Memory Game 🐾</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
  }

  h1 {
    color: white;
    font-size: 2.2rem;
    margin-bottom: 8px;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    text-align: center;
  }

  .subtitle {
    color: rgba(255,255,255,0.85);
    font-size: 1.05rem;
    margin-bottom: 20px;
    text-align: center;
  }

  .stats {
    display: flex;
    gap: 20px;
    margin-bottom: 20px;
  }

  .stat-box {
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(10px);
    border: 2px solid rgba(255,255,255,0.4);
    border-radius: 14px;
    padding: 10px 22px;
    color: white;
    text-align: center;
    min-width: 110px;
  }

  .stat-box .label {
    font-size: 0.78rem;
    opacity: 0.85;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .stat-box .value {
    font-size: 1.8rem;
    font-weight: 700;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
    max-width: 640px;
    width: 100%;
  }

  .card {
    aspect-ratio: 3/4;
    cursor: pointer;
    perspective: 600px;
  }

  .card-inner {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.45s cubic-bezier(0.4, 0, 0.2, 1);
    border-radius: 16px;
  }

  .card.flipped .card-inner,
  .card.matched .card-inner {
    transform: rotateY(180deg);
  }

  .card-front, .card-back {
    position: absolute;
    inset: 0;
    border-radius: 16px;
    backface-visibility: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 6px 20px rgba(0,0,0,0.25);
  }

  .card-front {
    background: linear-gradient(135deg, #4f46e5, #7c3aed);
    font-size: 2.8rem;
    color: rgba(255,255,255,0.4);
    user-select: none;
  }

  .card-back {
    transform: rotateY(180deg);
    background: white;
    flex-direction: column;
    gap: 6px;
    padding: 8px;
  }

  .card-back .emoji {
    font-size: 3.2rem;
    line-height: 1;
  }

  .card-back .word {
    font-size: 1.05rem;
    font-weight: 700;
    color: #1e293b;
    text-align: center;
  }

  /* word-only card */
  .card-back.word-card {
    background: linear-gradient(135deg, #f0fdf4, #dcfce7);
  }

  .card-back.word-card .word {
    font-size: 1.4rem;
    color: #166534;
  }

  /* emoji-only card */
  .card-back.emoji-card {
    background: linear-gradient(135deg, #fefce8, #fef9c3);
  }

  .card.matched .card-back {
    background: linear-gradient(135deg, #d1fae5, #a7f3d0) !important;
    border: 3px solid #10b981;
  }

  .card.matched .card-back .word {
    color: #065f46;
  }

  .card:hover:not(.flipped):not(.matched) .card-inner {
    transform: translateY(-4px) scale(1.02);
    filter: brightness(1.1);
  }

  /* Celebration overlay */
  #celebration {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 100;
    align-items: center;
    justify-content: center;
    flex-direction: column;
  }

  #celebration.show {
    display: flex;
  }

  .win-box {
    background: white;
    border-radius: 28px;
    padding: 40px 50px;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }

  @keyframes popIn {
    from { transform: scale(0.5); opacity: 0; }
    to   { transform: scale(1);   opacity: 1; }
  }

  .win-box .trophy { font-size: 5rem; }
  .win-box h2 { font-size: 2rem; color: #1e293b; margin: 10px 0 6px; }
  .win-box p  { color: #64748b; font-size: 1.1rem; margin-bottom: 22px; }

  .btn {
    display: inline-block;
    padding: 14px 32px;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    font-size: 1.1rem;
    font-weight: 700;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 4px 14px rgba(102,126,234,0.5);
  }

  .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(102,126,234,0.6); }
  .btn:active { transform: translateY(0); }

  /* Confetti canvas */
  #confetti-canvas {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 99;
  }

  /* Shake animation for wrong pair */
  @keyframes shake {
    0%,100% { transform: rotateY(180deg) translateX(0); }
    25%      { transform: rotateY(180deg) translateX(-8px); }
    75%      { transform: rotateY(180deg) translateX(8px); }
  }
  .card.wrong .card-inner { animation: shake 0.35s ease; }
</style>
</head>
<body>

<h1>🐾 Animal Memory Game</h1>
<p class="subtitle">Find the matching pairs! Click two cards to flip them.</p>

<div class="stats">
  <div class="stat-box">
    <div class="label">Tries</div>
    <div class="value" id="tries">0</div>
  </div>
  <div class="stat-box">
    <div class="label">Matches</div>
    <div class="value" id="matches">0</div>
  </div>
  <div class="stat-box">
    <div class="label">⏱ Time</div>
    <div class="value" id="timer">0:00</div>
  </div>
</div>

<div class="grid" id="grid"></div>

<div id="celebration">
  <canvas id="confetti-canvas"></canvas>
  <div class="win-box">
    <div class="trophy">🏆</div>
    <h2>You Win! 🎉</h2>
    <p id="win-msg">Amazing job! You found all the animals!</p>
    <button class="btn" onclick="restartGame()">▶ Play Again</button>
  </div>
</div>

<script>
const ANIMALS = [
  { word: "cat",      emoji: "🐱" },
  { word: "dog",      emoji: "🐶" },
  { word: "bird",     emoji: "🐦" },
  { word: "fish",     emoji: "🐟" },
  { word: "rabbit",   emoji: "🐰" },
  { word: "elephant", emoji: "🐘" },
  { word: "tiger",    emoji: "🐯" },
  { word: "frog",     emoji: "🐸" },
];

let cards = [];
let flipped = [];
let matchedCount = 0;
let tries = 0;
let timerInterval = null;
let seconds = 0;
let canFlip = true;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildCards() {
  const pairs = [];
  ANIMALS.forEach(a => {
    pairs.push({ id: a.word, type: "word",  content: a.word,  label: a.word });
    pairs.push({ id: a.word, type: "emoji", content: a.emoji, label: a.word });
  });
  return shuffle(pairs);
}

function formatTime(s) {
  return Math.floor(s / 60) + ":" + String(s % 60).padStart(2, "0");
}

function startTimer() {
  clearInterval(timerInterval);
  seconds = 0;
  document.getElementById("timer").textContent = "0:00";
  timerInterval = setInterval(() => {
    seconds++;
    document.getElementById("timer").textContent = formatTime(seconds);
  }, 1000);
}

function renderGrid() {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";
  cards.forEach((cardData, index) => {
    const card = document.createElement("div");
    card.className = "card";
    card.dataset.index = index;
    card.innerHTML = `
      <div class="card-inner">
        <div class="card-front">❓</div>
        <div class="card-back ${cardData.type}-card">
          ${cardData.type === "emoji"
            ? `<div class="emoji">${cardData.content}</div>`
            : `<div class="word">${cardData.content}</div>`}
        </div>
      </div>`;
    card.addEventListener("click", () => flipCard(card, cardData, index));
    grid.appendChild(card);
  });
}

function flipCard(el, data, index) {
  if (!canFlip) return;
  if (el.classList.contains("flipped") || el.classList.contains("matched")) return;
  if (flipped.length === 2) return;

  el.classList.add("flipped");
  flipped.push({ el, data, index });

  if (flipped.length === 2) {
    tries++;
    document.getElementById("tries").textContent = tries;
    canFlip = false;
    checkMatch();
  }
}

function checkMatch() {
  const [a, b] = flipped;
  const isMatch = a.data.id === b.data.id && a.data.type !== b.data.type;

  if (isMatch) {
    a.el.classList.add("matched");
    b.el.classList.add("matched");
    matchedCount++;
    document.getElementById("matches").textContent = matchedCount;
    flipped = [];
    canFlip = true;

    if (matchedCount === ANIMALS.length) {
      clearInterval(timerInterval);
      setTimeout(showCelebration, 400);
    }
  } else {
    a.el.classList.add("wrong");
    b.el.classList.add("wrong");
    setTimeout(() => {
      a.el.classList.remove("flipped", "wrong");
      b.el.classList.remove("flipped", "wrong");
      flipped = [];
      canFlip = true;
    }, 900);
  }
}

function showCelebration() {
  const cel = document.getElementById("celebration");
  cel.classList.add("show");
  document.getElementById("win-msg").textContent =
    `You found all 8 animals in ${tries} tries and ${formatTime(seconds)}! 🌟`;
  launchConfetti();
}

function restartGame() {
  document.getElementById("celebration").classList.remove("show");
  matchedCount = 0;
  tries = 0;
  flipped = [];
  canFlip = true;
  document.getElementById("tries").textContent = "0";
  document.getElementById("matches").textContent = "0";
  cards = buildCards();
  renderGrid();
  startTimer();
}

// ─── Confetti ───────────────────────────────────────────────
function launchConfetti() {
  const canvas = document.getElementById("confetti-canvas");
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const ctx = canvas.getContext("2d");
  const pieces = [];
  const colors = ["#f59e0b","#10b981","#3b82f6","#ef4444","#8b5cf6","#ec4899","#06b6d4"];

  for (let i = 0; i < 160; i++) {
    pieces.push({
      x: Math.random() * canvas.width,
      y: -Math.random() * canvas.height * 0.5,
      w: Math.random() * 12 + 5,
      h: Math.random() * 6 + 3,
      color: colors[Math.floor(Math.random() * colors.length)],
      vx: (Math.random() - 0.5) * 5,
      vy: Math.random() * 5 + 2,
      angle: Math.random() * 360,
      spin: (Math.random() - 0.5) * 8,
    });
  }

  let frame;
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    pieces.forEach(p => {
      ctx.save();
      ctx.translate(p.x + p.w / 2, p.y + p.h / 2);
      ctx.rotate(p.angle * Math.PI / 180);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
      ctx.restore();
      p.x += p.vx;
      p.y += p.vy;
      p.angle += p.spin;
      p.vy += 0.12; // gravity
    });
    if (pieces.some(p => p.y < canvas.height)) {
      frame = requestAnimationFrame(draw);
    } else {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }
  }
  draw();
}

// ─── Init ───────────────────────────────────────────────────
cards = buildCards();
renderGrid();
startTimer();
</script>
</body>
</html>
